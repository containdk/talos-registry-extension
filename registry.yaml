name: registry
depends:
  - service: cri
  - network:
      - addresses
      - connectivity
      - etcfiles
  - configuration: true
container:
  entrypoint: /bin/zot
  args:
    - serve
    - /etc/zot/config.json
  security:
    writeableRootfs: false
    writeableSysfs: true
  mounts:
    - destination: /var/lib/registry
      type: bind
      source: /var/lib/registry
      options:
        - rbind
        - rshared
        - rw
restart: always
