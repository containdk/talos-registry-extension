name: registry
depends:
  - service: cri
  - network:
      - addresses
      - connectivity
      - etcfiles
  - configuration: true
container:
  image: distribution/distribution:3
  command:
    - /bin/registry
    - serve
    - /etc/docker/registry/config.yml
  ports:
    - containerPort: 5001
      hostPort: 5001
  security:
    writeableRootfs: false
    writeableSysfs: true
  mounts:
    - destination: /var/lib/registry
      type: bind
      source: /var/lib/registry
      options:
        - rbind
        - rshared
        - rw
    - destination: /etc/docker/registry/config.yml
      type: bind
      source: /usr/local/etc/registry/config.yml
      options:
        - ro
restart: always
